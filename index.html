<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白莲花大饭店｜文创测试</title>
  <style>
    :root{
      --bg:#0b0a09;--panel:#12100e;--text:#e9e1d3;--muted:#c9b99b;
      --accent:#c59b5a;--line:rgba(197,155,90,0.35);--card:#181613;
      --card2:#1e1b17;--shadow:rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
      "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.8}
    .container{width:100%;max-width:920px;margin:0 auto;padding:0 18px}

    /* Hero */
    .hero{
      position:relative;width:100%;
      display:block;
    }
    .hero-img{
      width:100%;height:auto;display:block;
    }

    /* 内容卡片 */
    .section{
      background:transparent;
      border:none;padding:24px 18px 22px;
      box-shadow:none;
      margin:0 auto 32px;
      position:relative;z-index:2;
    }
    .intro{color:var(--muted);text-align:justify;text-align: center;margin: 0;}

    .progress-container{
      margin:24px 0 18px;background:#141210;
      border:1px solid var(--line);border-radius:999px;padding:6px;
    }
    .progress{
      height:10px;border-radius:999px;
      background:linear-gradient(90deg,#7a5b2b,var(--accent));
      width:0%;transition:width .35s ease;
    }

    .question-container{
      margin-top:36px;background:#151310;
      border:1px solid var(--line);border-radius:10px;padding:16px;
    }
    .question{font-size:15px;margin:0;line-height:1.5;text-align:left;margin-bottom: 12px;}
    .options{display:grid;gap:12px}

    /* ★ 关键：option 必须是 block 级，宽度撑满 */
    .option{
      display:block;width:100%;
      padding:14px 16px;border:1px solid var(--line);border-radius:8px;
      background:transparent;color:var(--text);cursor:pointer;
      transition:all .2s ease;text-align:left;font-size:1rem;
    }
    .option:hover{border-color:var(--accent);background:rgba(197,155,90,0.05)}
    .option.selected{
      border-color:var(--accent);background:rgba(197,155,90,0.1);
      box-shadow:0 0 0 1px var(--accent) inset;
    }

    .actions{display:flex;gap:10px;margin-top:24px;}
    .btn{
      padding:8px 20px;border-radius:8px;border:1px solid var(--line);
      background:#1d1a16;color:var(--text);cursor:pointer;
      transition:all .2s ease;font-size:14px;flex: 1;
    }
    .btn:hover{border-color:var(--accent);background:#242018}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn.primary{
      background:linear-gradient(180deg,#2a241d,#1f1a14);
      border-color:var(--accent);
    }
    .btn.primary:hover:not(:disabled){filter:brightness(1.1)}

    .result{
      margin-top:14px;padding:16px;border:1px solid var(--line);
      border-radius:10px;background:#16130f;color:var(--muted);line-height:1.8;
    }

    footer{color:var(--muted);opacity:.8;text-align:center;padding:20px 18px 40px;font-size: 13px;}

    @media(max-width:768px){
      .section{margin-top:0px}
    }
    @media(max-width:480px){
      .section{margin-top:0px}
    }
  </style>
</head>
<body>

<header class="hero" role="banner">
  <img src="./images/hero.jpg" alt="白莲花大饭店" class="hero-img" />
</header>

<main class="container">
  <section class="section">
    <p class="intro">
      亲爱的旅人，当你看到这卷测试的时候<br>
你正在人生的路口上<br>
是成为被谋杀阴影笼罩的自由之人<br>
还是停留在酒店制服以内的永恒侍者<br>
答案没有对错，请追随心之所想<br>
本酒店保留一切关于命运的解释权
    </p>
    <div class="progress-container">
      <div id="progress" class="progress"></div>
    </div>
    <div id="qBox" class="question-container">
      <p id="question" class="question">准备好开始了吗？</p>
      <div id="options" class="options"></div>
      <div class="actions">
        <button id="prevBtn" class="btn" disabled>上一步</button>
        <button id="nextBtn" class="btn primary">开始</button>
      </div>
      <div id="result" class="result" style="display:none"></div>
    </div>
  </section>
</main>

<footer>© 白莲花大饭店｜文创测试 · 仅供娱乐</footer>

<script>
// ── 题库 ──────────────────────────────────────────────
const questions = [
  {
    q:"如果你醒来发现自己正坐在酒店大堂沙发上，口袋里有一张房卡，但不记得怎么来的，你会：",
    sel:null,
    options:[
      { text:"去前台问清楚", score:1 },
      { text:"上楼试试看是哪间房", score:2 },
      { text:"把房卡交给最近的员工", score:1 },
      { text:"把它藏起来，看看谁会来找你", score:2 }
    ]
  },
  {
    q:"哪一段话最接近你的内心独白？",
    sel:null,
    options:[
      { text:"\"只要我不说，事情就不算发生过。\"", score:2 },
      { text:"\"我一直在扮演别人期待的样子。\"", score:2 },
      { text:"\"我很擅长记住别人的表情，但忘记他们说了什么。\"", score:1 },
      { text:"\"没有人真的会关心你几点退房。\"", score:1 }
    ]
  },
  {
    q:"你最想在手帐中记录哪一类内容？",
    sel:null,
    options:[
      { text:"密码和暗号", score:2 },
      { text:"日常琐碎+不愿忘记的梦", score:1 },
      { text:"和某人发生的争执与沉默", score:1 },
      { text:"某天有人路过你门口留下的纸条", score:2 }
    ]
  },
  {
    q:"以下哪个场景最让你不安？",
    sel:null,
    options:[
      { text:"电梯在你没按的楼层停下", score:2 },
      { text:"房间里的镜子似乎多了一面", score:1 },
      { text:"服务员用一个你没告诉过谁的称呼叫你", score:2 },
      { text:"手帐中出现了不属于你字迹的一页", score:1 }
    ]
  },
  {
    q:"你认为酒店员工最大的美德是：",
    sel:null,
    options:[
      { text:"保持沉默", score:2 },
      { text:"快速记忆贵宾偏好", score:1 },
      { text:"精准执行未解释的命令", score:2 },
      { text:"知道什么时候看得见，什么时候看不见", score:2 }
    ]
  },
  {
    q:"你愿意哪一张贴纸出现在你书写的那一页？",
    sel:null,
    options:[
      { text:"一只戴白手套的手指在\"嘘\"你", score:2 },
      { text:"一支空酒杯，下面印着\"1935\"", score:1 },
      { text:"一朵枯萎的白莲花，写着\"请勿打扰\"", score:1 },
      { text:"一台开着门的电梯，没有人下车", score:2 }
    ]
  },
  {
    q:"如果要撒一个谎，最可能是：",
    sel:null,
    options:[
      { text:"\"我没看到他进去。\"", score:2 },
      { text:"\"这是我第一次来。\"", score:1 },
      { text:"\"我只是路过。\"", score:2 },
      { text:"\"那本手帐不是我的。\"", score:1 }
    ]
  },
  {
    q:"你是否曾经在日常生活中：",
    sel:null,
    options:[
      { text:"记得别人忘记的细节", score:1 },
      { text:"梦见过某个不存在的房间", score:2 },
      { text:"在记录日记时感到某页\"不属于你\"", score:2 },
      { text:"看过陌生人的笔记却产生熟悉感", score:1 }
    ]
  },
  {
    q:"以下哪一页你最想先翻开？",
    sel:null,
    options:[
      { text:"\"锅炉房 · 夜班登记记录\"页", score:2 },
      { text:"\"湖景餐厅 · 狙击角度示意图\"页", score:1 },
      { text:"\"404房间 · 空白纸张焚毁记录\"页", score:2 },
      { text:"\"礼宾寄存 · 私人物品拒收清单\"页", score:1 }
    ]
  },
  {
    q:"你希望这两本手帐为你达成什么目的？",
    sel:null,
    options:[
      { text:"留下线索，让别人找到你", score:2 },
      { text:"记录细节，为日后回忆", score:1 },
      { text:"掩盖真相，让某些事情永远沉默", score:2 },
      { text:"完成一个从未有机会说出口的故事", score:1 }
    ]
  }
];

// ── DOM ───────────────────────────────────────────────
const qEl      = document.getElementById('question');
const optsEl   = document.getElementById('options');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const progEl   = document.getElementById('progress');
const resultEl = document.getElementById('result');
const qBox     = document.getElementById('qBox');

let cur = -1;   // -1 = 欢迎页

// ── 渲染 ──────────────────────────────────────────────
function render() {
  resultEl.style.display = 'none';

  if (cur < 0) {
    qEl.textContent   = '准备好开始了吗？';
    optsEl.innerHTML  = '';
    nextBtn.textContent = '开始';
    nextBtn.disabled  = false;
    prevBtn.disabled  = true;
    progEl.style.width = '0%';
    return;
  }

  const data = questions[cur];
  qEl.textContent = `第 ${cur + 1} 题 / 共 ${questions.length} 题：${data.q}`;

  // 渲染选项
  optsEl.innerHTML = '';
  data.options.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'option' + (data.sel === i ? ' selected' : '');
    btn.textContent = op.text;
    btn.addEventListener('click', () => pick(i));
    optsEl.appendChild(btn);
  });

  nextBtn.textContent = cur < questions.length - 1 ? '下一题' : '查看结果';
  nextBtn.disabled  = false;
  prevBtn.disabled  = cur === 0;

  // 进度条：完成题数 / 总题数
  progEl.style.width = Math.round(((cur + 1) / questions.length) * 100) + '%';
}

// ── 选择选项 ──────────────────────────────────────────
function pick(i) {
  questions[cur].sel = i;
  [...optsEl.children].forEach((el, idx) =>
    el.classList.toggle('selected', idx === i)
  );
}

// ── 计算结果 ──────────────────────────────────────────
function showResult() {
  let totalScore = 0;
  questions.forEach(q => {
    if (q.sel !== null) {
      totalScore += q.options[q.sel].score;
    }
  });

  let result = '';
  if (totalScore >= 10 && totalScore <= 14) {
    result = `
      <strong style="color:var(--accent);font-size:1.1rem">
        建议入住 · 贵宾欢迎函
      </strong><br><br>
      您的记忆仍完整，意识尚可辨识真伪，非常适合体验白莲花大饭店的套房生活。<br>
      但请注意，一旦入睡，可能会被误认为"长期住客"。
    `;
  } else if (totalScore >= 15 && totalScore <= 20) {
    result = `
      <strong style="color:var(--accent);font-size:1.1rem">
        建议入职 · 编号待分配
      </strong><br><br>
      您的行为逻辑、判断机制与记忆漏洞均符合本店用人标准。<br>
      礼宾部将为您准备制服、档案袋与"特别培训"页面，<br>
      请尽快熟悉8号电梯的规避技巧。
    `;
  }

  progEl.style.width = '100%';
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    ${result}<br><br>
    <span style="font-size:.9rem">
      总得分：${totalScore} 分
    </span>
  `;
  nextBtn.disabled = true;
  qBox.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── 按钮事件 ──────────────────────────────────────────
nextBtn.addEventListener('click', () => {
  // 欢迎页 → 第一题
  if (cur === -1) {
    cur = 0;
    render();
    return;
  }
  // 未选择
  if (questions[cur].sel === null) {
    alert('请先选择一个选项 😊');
    return;
  }
  // 还有下一题
  if (cur < questions.length - 1) {
    cur++;
    render();
    return;
  }
  // 最后一题 → 结果
  showResult();
});

prevBtn.addEventListener('click', () => {
  if (cur > 0) {
    cur--;
    nextBtn.disabled = false;
    render();
  }
});

// ── 初始化 ────────────────────────────────────────────
render();
</script>
</body>
</html>
