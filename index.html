<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>白莲花大饭店｜入住人格测试</title>
  <meta name="description" content="欢迎来到白莲花大饭店，请根据直觉完成测试，放松心态，跟随第一反应即可。" />
  <meta name="theme-color" content="#0a0806" />

  <style>
    /* CSS Reset（精简版） */
    *,*::before,*::after{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:#e9e5df;background:#0a0806;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
    img{max-width:100%;display:block}
    button,input,select,textarea{font:inherit;color:inherit}
    :root{
      --bg:#0a0806;
      --card:#151310;
      --card-2:#1b1916;
      --text:#e9e5df;
      --muted:#bdb7ae;
      --accent:#d2c1a8;
      --line:rgba(255,255,255,0.08);
      --shadow:0 6px 18px rgba(0,0,0,.3);
      --radius:14px;
    }

    /* 布局 */
    .page{
      min-height:100%;
      display:flex;
      flex-direction:column;
      background:var(--bg);
    }

    /* 顶部横幅：仅背景图，无文字层 */
    header.hero{
      position:relative;
      width:100%;
      min-height:72vh; /* PC 默认高度，可按需 68–78vh */
      overflow:hidden;
      isolation:isolate;
    }
    .hero::before{
      content:"";
      position:absolute;inset:0;
      background-image:url('./images/hero.jpg'); /* 确保存在 */
      background-size:cover;
      background-position:center 20%; /* 取景略上移，让建筑居中 */
      background-repeat:no-repeat;
      filter:brightness(0.64) saturate(0.96);
      transform:none;
      will-change:transform;
    }

    /* 主体容器 */
    .container{
      width:100%;
      max-width:880px;
      margin:0 auto;
      padding:24px 20px 64px;
    }

    /* 卡片 */
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,0.02),rgba(255,255,255,0)) , var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px 16px;
      backdrop-filter:saturate(110%) blur(2px);
    }
    .card + .card{ margin-top:14px; }

    .card h2{
      margin:0 0 10px;color:var(--text);font-size:18px;font-weight:600;letter-spacing:.2px
    }
    .card p{margin:0;color:var(--muted);line-height:1.6;font-size:15px}

    /* 表单与按钮 */
    .field{margin-top:14px}
    .input{
      width:100%;
      height:44px;
      padding:0 14px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--card-2);
      color:var(--text);
      outline:none;
    }
    .input::placeholder{color:#8e887f}
    .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:14px}
    .btn{
      appearance:none;border:1px solid var(--line);background:var(--card-2);color:var(--text);
      padding:10px 16px;border-radius:12px;cursor:pointer;transition:all .2s ease
    }
    .btn.primary{background:linear-gradient(180deg,#2a2824,#1b1916);border-color:#3a3733}
    .btn:hover{transform:translateY(-1px)}
    .btn:active{transform:translateY(0)}
    .btn[disabled]{opacity:.5;cursor:not-allowed}

    /* 分割线 */
    .divider{
      height:1px;background:var(--line);margin:12px 0 12px;
    }

    /* 页脚 */
    footer{color:#7d776e;font-size:12px;text-align:center;padding:24px 16px 40px}

    /* ——移动端专项优化（关键）—— */
    @media (max-width: 768px){
      header.hero{ min-height:86vh; }
      .hero::before{
        background-position:center 6%;
        background-size:cover;
        filter:brightness(0.7) saturate(0.96);
      }
      .container{ padding:18px 16px 56px; }
      .card{ border-radius:12px; }
    }
    @media (max-width: 480px){
      header.hero{ min-height:92vh; }
      .hero::before{
        background-position:center 0%;
        filter:brightness(0.72) saturate(0.96);
      }
      .container{ padding:16px 14px 48px; }
    }

    /* ——可选：提供竖图时自动切换（把 images/hero-mobile.jpg 放好再取消注释）—— */
    /*
    @media (max-width: 768px){
      .hero::before{
        background-image:url('./images/hero-mobile.jpg');
        background-position:center 12%;
        background-size:cover;
        filter:brightness(0.7) saturate(0.96);
      }
    }
    */

    /* 可选：绝不裁切的“contain 模式”（与上面 cover 二选一，默认关闭）
    @media (max-width: 768px){
      header.hero{ min-height:100vh; }
      .hero::before{
        background-size:contain;
        background-repeat:no-repeat;
        background-position:center top;
        background-color:#0a0806;
      }
    }
    */
  </style>
</head>

<body>
  <div class="page">

    <!-- 仅背景图的首屏，无任何文字层 -->
    <header class="hero" role="banner" aria-label="白莲花大饭店首屏横幅"></header>

    <!-- 主体内容：你可以替换为自己的问卷/流程 -->
    <main class="container" role="main">
      <section class="card" aria-label="欢迎说明">
        <h2>欢迎来到白莲花大饭店</h2>
        <p>请根据你的直觉作答，整套问卷大约需要 2–3 分钟。答案没有对错，放松心态，跟随第一反应即可。</p>
        <div class="field">
          <input class="input" type="text" placeholder="可选：输入昵称（用于报告显示）" aria-label="昵称" />
        </div>
        <div class="btn-row">
          <button class="btn">上一步</button>
          <button class="btn primary" id="startBtn">开始</button>
        </div>
      </section>

      <!-- 示例：后续题目区（占位，你可替换为真实题目模板或 JS 渲染） -->
      <section class="card" id="quiz" hidden>
        <h2>题目 1/10</h2>
        <p>这是示例题目内容……</p>
        <div class="field">
          <button class="btn">选项 A</button>
          <button class="btn">选项 B</button>
          <button class="btn">选项 C</button>
        </div>
        <div class="btn-row">
          <button class="btn">上一题</button>
          <button class="btn primary">下一题</button>
        </div>
      </section>

      <!-- 结果卡片（占位） -->
      <section class="card" id="result" hidden>
        <h2>你的入住画像</h2>
        <p>这里展示你的结果与解读……</p>
        <div class="btn-row">
          <button class="btn">重做一次</button>
          <button class="btn primary">分享</button>
        </div>
      </section>
    </main>

    <footer>
      © 白莲花大饭店 · 入住人格测试
    </footer>
  </div>

  <script>
    // 极简交互示例：点击“开始”显示题目卡片（可替换为你的实际逻辑）
    const startBtn = document.getElementById('startBtn');
    const quiz = document.getElementById('quiz');
    if (startBtn && quiz){
      startBtn.addEventListener('click', ()=>{
        quiz.hidden = false;
        // 可滚动到题目区
        quiz.scrollIntoView({behavior:'smooth', block:'start'});
      });
    }
  </script>
</body>
</html>
