<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>白莲花大饭店｜入住人格测试</title>
  <style>
    :root{
      --bg:#0b0a09;--panel:#12100e;--text:#e9e1d3;--muted:#c9b99b;
      --accent:#c59b5a;--line:rgba(197,155,90,0.35);--card:#181613;
      --card2:#1e1b17;--shadow:rgba(0,0,0,0.35);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,
      "PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;line-height:1.6}
    .container{width:100%;max-width:920px;margin:0 auto;padding:0 18px}

    /* Hero */
    .hero{
      position:relative;width:100%;height:360px;
      display:flex;align-items:flex-end;justify-content:center;text-align:center;
      overflow:hidden;border-bottom:1px solid var(--line);background:#0a0806;
    }
    .hero::before{
      content:"";position:absolute;inset:0;
      background-image:url('./images/hero.jpg');
      background-size:cover;background-position:center 20%;
      filter:brightness(0.55) saturate(0.95);
    }
    .hero::after{
      content:"";position:absolute;inset:0;
      background:radial-gradient(60% 60% at 50% 40%,rgba(10,8,6,0) 0%,rgba(10,8,6,0.35) 55%,rgba(10,8,6,0.72) 100%),
        linear-gradient(to bottom,rgba(10,8,6,0.05),rgba(10,8,6,0.65));
    }
    .hero-content{position:relative;z-index:1;padding:1.6rem 1rem 2rem;text-shadow:0 2px 8px var(--shadow)}
    .hero-title{margin:0 0 .3rem;font-size:2.4rem;letter-spacing:.08em;font-weight:700}
    .hero-subtitle{margin:.2rem 0 .6rem;color:var(--muted);font-size:1.1rem;letter-spacing:.06em}
    .hero-quote{margin-top:.3rem;color:var(--accent);opacity:.92;font-style:italic;font-size:.95rem}
    .divider{width:100px;height:1px;background:var(--line);margin:.8rem auto 0;opacity:.9}

    /* 内容卡片 */
    .section{
      background:linear-gradient(180deg,var(--card),var(--card2));
      border:1px solid var(--line);border-radius:12px;padding:22px 18px;
      box-shadow:0 8px 28px var(--shadow);
      margin:-36px auto 32px;   /* 向上叠压 Hero */
      position:relative;z-index:2;
    }
    .intro{color:var(--muted);margin-bottom:14px;text-align:justify}

    .progress-container{
      margin:14px 0 18px;background:#141210;
      border:1px solid var(--line);border-radius:999px;padding:6px;
    }
    .progress{
      height:10px;border-radius:999px;
      background:linear-gradient(90deg,#7a5b2b,var(--accent));
      width:0%;transition:width .35s ease;
    }

    .question-container{
      margin-top:10px;background:#151310;
      border:1px solid var(--line);border-radius:10px;padding:16px;
    }
    .question{font-size:1.1rem;margin:0 0 14px;line-height:1.5}
    .options{display:grid;gap:10px}

    /* ★ 关键：option 必须是 block 级，宽度撑满 */
    .option{
      display:block;width:100%;
      padding:12px 14px;border:1px solid var(--line);border-radius:8px;
      background:#191714;color:var(--text);cursor:pointer;
      transition:all .2s ease;text-align:left;font-size:1rem;
    }
    .option:hover{border-color:var(--accent);background:#201d18}
    .option.selected{
      border-color:var(--accent);background:#222018;
      box-shadow:0 0 0 1px var(--accent) inset;
    }

    .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
    .btn{
      padding:10px 20px;border-radius:8px;border:1px solid var(--line);
      background:#1d1a16;color:var(--text);cursor:pointer;
      transition:all .2s ease;font-size:1rem;
    }
    .btn:hover{border-color:var(--accent);background:#242018}
    .btn:disabled{opacity:.4;cursor:not-allowed}
    .btn.primary{
      background:linear-gradient(180deg,#2a241d,#1f1a14);
      border-color:var(--accent);
    }
    .btn.primary:hover:not(:disabled){filter:brightness(1.1)}

    .result{
      margin-top:14px;padding:16px;border:1px solid var(--line);
      border-radius:10px;background:#16130f;color:var(--muted);line-height:1.8;
    }

    footer{color:var(--muted);opacity:.8;text-align:center;padding:28px 18px 40px}

    @media(max-width:768px){
      .hero{height:280px}
      .hero-title{font-size:2rem}
      .section{margin-top:-24px}
    }
    @media(max-width:480px){
      .hero{height:240px}
      .hero-title{font-size:1.7rem}
      .hero-subtitle{font-size:.92rem}
      .section{margin-top:-20px}
    }
  </style>
</head>
<body>

<header class="hero" role="banner">
  <div class="hero-content">
    <h1 class="hero-title">白莲花大饭店</h1>
    <div class="hero-subtitle">入住人格测试</div>
    <div class="divider"></div>
    <p class="hero-quote">"顺利入住，然后成为猎物"</p>
  </div>
</header>

<main class="container">
  <section class="section">
    <p class="intro">
      欢迎来到白莲花大饭店。请根据你的直觉作答，整套问卷大约需要 2–3 分钟。答案没有对错，放松心态，跟随第一反应即可。
    </p>
    <div class="progress-container">
      <div id="progress" class="progress"></div>
    </div>
    <div id="qBox" class="question-container">
      <p id="question" class="question">准备好开始了吗？</p>
      <div id="options" class="options"></div>
      <div class="actions">
        <button id="prevBtn" class="btn" disabled>上一步</button>
        <button id="nextBtn" class="btn primary">开始</button>
      </div>
      <div id="result" class="result" style="display:none"></div>
    </div>
  </section>
</main>

<footer>© 白莲花大饭店｜人格测试 · 仅供娱乐</footer>

<script>
// ── 题库 ──────────────────────────────────────────────
const questions = [
  { q:"进入陌生环境时，你更在意：", sel:null, options:[
    { text:"先观察规则与秩序",     score:{order:2} },
    { text:"快速结识关键人物",     score:{social:2} },
    { text:"找安全出口与路径",     score:{guard:2} },
    { text:"随性探索，边走边看",   score:{explore:2} },
  ]},
  { q:"面临突发状况时，你往往：", sel:null, options:[
    { text:"冷静评估再行动",       score:{guard:2} },
    { text:"拉人组队一起解决",     score:{social:2} },
    { text:"先稳住表面秩序",       score:{order:2} },
    { text:"大胆试错寻找突破",     score:{explore:2} },
  ]},
  { q:"与陌生人同桌，你会：", sel:null, options:[
    { text:"礼貌寒暄，保持分寸",   score:{order:2} },
    { text:"打开话匣子，迅速热络", score:{social:2} },
    { text:"观察对方细节再决定",   score:{guard:2} },
    { text:"抛出奇特话题活跃气氛", score:{explore:2} },
  ]},
  { q:"更看重的"安全感"来源是：", sel:null, options:[
    { text:"清晰规则和稳定预期",   score:{order:2} },
    { text:"可靠的人脉与互助",     score:{social:2} },
    { text:"自我控制与备份方案",   score:{guard:2} },
    { text:"随机应变与自由空间",   score:{explore:2} },
  ]},
  { q:"当计划被打乱时，你：", sel:null, options:[
    { text:"重新排程，确保每步可控", score:{order:2} },
    { text:"看看谁能帮我一把",       score:{social:2} },
    { text:"优先减少损失，保留底线", score:{guard:2} },
    { text:"顺势而为，也许是机会",   score:{explore:2} },
  ]},
  { q:"你对"秘密"的态度：", sel:null, options:[
    { text:"不轻易分享，分层管理",   score:{guard:2} },
    { text:"合适时建立信任与交换",   score:{social:2} },
    { text:"记录、归档、设置权限",   score:{order:2} },
    { text:"秘密是故事的一部分",     score:{explore:2} },
  ]},
  { q:"在团队中更自然的角色：", sel:null, options:[
    { text:"秩序维护者 / 流程官",   score:{order:2} },
    { text:"气氛与关系中枢",         score:{social:2} },
    { text:"风险官 / 守门人",        score:{guard:2} },
    { text:"点子王 / 破局者",        score:{explore:2} },
  ]},
  { q:"面对"白莲花大饭店"的邀请，你会：", sel:null, options:[
    { text:"先研究入住须知与规约",     score:{order:2} },
    { text:"问问熟人有没有门道",       score:{social:2} },
    { text:"确认人身与隐私保护措施",   score:{guard:2} },
    { text:"马上订票，去现场再说",     score:{explore:2} },
  ]},
];

// ── DOM ───────────────────────────────────────────────
const qEl      = document.getElementById('question');
const optsEl   = document.getElementById('options');
const prevBtn  = document.getElementById('prevBtn');
const nextBtn  = document.getElementById('nextBtn');
const progEl   = document.getElementById('progress');
const resultEl = document.getElementById('result');
const qBox     = document.getElementById('qBox');

let cur = -1;   // -1 = 欢迎页

// ── 渲染 ──────────────────────────────────────────────
function render() {
  resultEl.style.display = 'none';

  if (cur < 0) {
    qEl.textContent   = '准备好开始了吗？';
    optsEl.innerHTML  = '';
    nextBtn.textContent = '开始';
    nextBtn.disabled  = false;
    prevBtn.disabled  = true;
    progEl.style.width = '0%';
    return;
  }

  const data = questions[cur];
  qEl.textContent = `第 ${cur + 1} 题 / 共 ${questions.length} 题：${data.q}`;

  // 渲染选项
  optsEl.innerHTML = '';
  data.options.forEach((op, i) => {
    const btn = document.createElement('button');
    btn.type      = 'button';
    btn.className = 'option' + (data.sel === i ? ' selected' : '');
    btn.textContent = op.text;
    btn.addEventListener('click', () => pick(i));
    optsEl.appendChild(btn);
  });

  nextBtn.textContent = cur < questions.length - 1 ? '下一题' : '查看结果';
  nextBtn.disabled  = false;
  prevBtn.disabled  = cur === 0;

  // 进度条：完成题数 / 总题数
  progEl.style.width = Math.round((cur / questions.length) * 100) + '%';
}

// ── 选择选项 ──────────────────────────────────────────
function pick(i) {
  questions[cur].sel = i;
  [...optsEl.children].forEach((el, idx) =>
    el.classList.toggle('selected', idx === i)
  );
}

// ── 计算结果 ──────────────────────────────────────────
function showResult() {
  const sc = { order:0, social:0, guard:0, explore:0 };
  questions.forEach(q => {
    if (q.sel !== null) {
      Object.entries(q.options[q.sel].score).forEach(([k, v]) => sc[k] += v);
    }
  });

  const labels = {
    order:  ['秩序派',  '尊重规则，重视流程与稳定，是团队里的秩序锚。'],
    social: ['社交派',  '善于连接与协作，关系网络就是你的资源池。'],
    guard:  ['守护派',  '谨慎而稳健，风险意识强，是关键时刻的刹车与盾牌。'],
    explore:['探索派',  '好奇且勇于打破边界，喜欢从不确定中寻宝。'],
  };
  const top = Object.entries(sc).sort((a,b) => b[1]-a[1])[0][0];

  progEl.style.width = '100%';
  resultEl.style.display = 'block';
  resultEl.innerHTML = `
    <strong style="color:var(--accent);font-size:1.1rem">
      🏨 你的入住倾向：${labels[top][0]}
    </strong><br><br>
    ${labels[top][1]}<br><br>
    <span style="font-size:.9rem">
      维度得分 ▸ 秩序 ${sc.order} ｜ 社交 ${sc.social} ｜ 守护 ${sc.guard} ｜ 探索 ${sc.explore}
    </span>
  `;
  nextBtn.disabled = true;
  qBox.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── 按钮事件 ──────────────────────────────────────────
nextBtn.addEventListener('click', () => {
  // 欢迎页 → 第一题
  if (cur === -1) {
    cur = 0;
    render();
    return;
  }
  // 未选择
  if (questions[cur].sel === null) {
    alert('请先选择一个选项 😊');
    return;
  }
  // 还有下一题
  if (cur < questions.length - 1) {
    cur++;
    render();
    return;
  }
  // 最后一题 → 结果
  showResult();
});

prevBtn.addEventListener('click', () => {
  if (cur > 0) {
    cur--;
    nextBtn.disabled = false;
    render();
  }
});

// ── 初始化 ────────────────────────────────────────────
render();
</script>
</body>
</html>
